name: CI

on:
  push:
    branches: [main, develop]
  pull_request:
    branches: [main]

jobs:
  test-contracts:
    name: Rust Contract Tests
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Install Rust
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: wasm32-unknown-unknown
      - name: Cache Cargo
        uses: actions/cache@v4
        with:
          path: |
            ~/.cargo/registry
            ~/.cargo/git
            target
          key: ${{ runner.os }}-cargo-${{ hashFiles('**/Cargo.lock') }}
      - name: Test stellar_token
        run: cargo test --manifest-path contracts/stellar_token/Cargo.toml
      - name: Test liquidity_pool
        run: cargo test --manifest-path contracts/liquidity_pool/Cargo.toml
      - name: Test pool_registry
        run: cargo test --manifest-path contracts/pool_registry/Cargo.toml

  test-frontend:
    name: Frontend Tests
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
      - run: npm ci
      - name: Run Vitest
        run: npm test
      - name: Type check
        run: npx tsc --noEmit
      - name: Lint
        run: npm run lint

  build:
    name: Next.js Build
    runs-on: ubuntu-latest
    needs: [test-frontend]
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
      - run: npm ci
      - name: Build
        env:
          NEXT_PUBLIC_TOKEN_CONTRACT_ID: ${{ secrets.NEXT_PUBLIC_TOKEN_CONTRACT_ID }}
          NEXT_PUBLIC_POOL_CONTRACT_ID: ${{ secrets.NEXT_PUBLIC_POOL_CONTRACT_ID }}
          NEXT_PUBLIC_REGISTRY_CONTRACT_ID: ${{ secrets.NEXT_PUBLIC_REGISTRY_CONTRACT_ID }}
          NEXT_PUBLIC_NETWORK: testnet
        run: npm run build
      - name: Upload build artifact
        uses: actions/upload-artifact@v4
        with:
          name: nextjs-build
          path: .next/
          retention-days: 1
